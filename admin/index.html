<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora Coffee Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f0f;
        --panel: #171717;
        --text: #f5f5f5;
        --muted: #bfbfbf;
        --accent: #ffffff;
        --border: #2f2f2f;
        --danger: #ff6b6b;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 24px;
      }
      .shell {
        max-width: 980px;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 24px;
      }
      h1 { margin-top: 0; }
      p { color: var(--muted); line-height: 1.5; }
      .card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        margin-top: 16px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input, button {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #111;
        color: var(--text);
        box-sizing: border-box;
      }
      button {
        cursor: pointer;
        background: var(--accent);
        color: #111;
        font-weight: 700;
        border: 0;
      }
      .button-row {
        display: flex;
        gap: 8px;
      }
      .button-row button {
        flex: 1;
      }
      .secondary {
        background: #222;
        color: var(--text);
      }
      .danger {
        background: var(--danger);
        color: white;
      }
      .status { margin-top: 12px; font-weight: 600; }
      .status.error { color: #ff8a8a; }
      .status.ok { color: #92f7b8; }
      .product-list {
        display: grid;
        gap: 10px;
      }
      .product-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #131313;
      }
      .product-item strong { display: block; margin-bottom: 2px; }
      .muted { color: var(--muted); font-size: 0.95rem; }
      .actions {
        display: flex;
        gap: 8px;
        min-width: 180px;
      }
      .actions button {
        margin-top: 0;
        padding: 8px 10px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>Agora Coffee Admin</h1>
      <p>Bu sayfa müşterilerden gizli tutulur. Ürünleri düzenleyip silebilirsiniz.</p>

      <div class="card">
        <form id="productForm" enctype="multipart/form-data">
          <input type="hidden" name="product_id" id="productId" />
          <input type="hidden" name="category_mode" id="categoryMode" value="existing" />
          <label>Ürün adı
            <input name="name" id="name" required placeholder="Örn. Matcha Latte" />
          </label>
          <label>Kategori
            <select name="category" id="categorySelect" required></select>
          </label>
          <div id="newCategoryFields" hidden>
            <label>Yeni kategori adı
              <input name="new_category_name" id="newCategoryName" placeholder="Örn. Mocktails" />
            </label>
            <label>Kategori görseli
              <input name="category_photo" id="categoryPhoto" type="file" accept="image/*" />
            </label>
          </div>
          <label>Fiyat
            <input name="price" id="price" type="number" min="0" step="0.01" required placeholder="0" />
          </label>
          <label>Fotoğraf
            <input name="photo" id="photo" type="file" accept="image/*" />
          </label>
          <div class="button-row">
            <button type="submit" id="submitButton">Ürünü Ekle</button>
            <button type="button" id="cancelEdit" class="secondary" hidden>İptal</button>
          </div>
        </form>
        <div id="status" class="status">Ürün listesi yükleniyor…</div>
      </div>

      <div class="card">
        <h2 style="margin-top: 0;">Kategoriler</h2>
        <div id="categoryList" class="product-list"></div>
      </div>

      <div class="card">
        <h2 style="margin-top: 0;">Mevcut ürünler</h2>
        <div id="productList" class="product-list"></div>
      </div>
    </div>

    <script>
      const form = document.getElementById('productForm');
      const productList = document.getElementById('productList');
      const categoryList = document.getElementById('categoryList');
      const status = document.getElementById('status');
      const submitButton = document.getElementById('submitButton');
      const cancelEditButton = document.getElementById('cancelEdit');
      const productIdInput = document.getElementById('productId');
      const categorySelect = document.getElementById('categorySelect');
      const categoryModeInput = document.getElementById('categoryMode');
      const newCategoryFields = document.getElementById('newCategoryFields');
      let editingProductId = null;
      let apiWritable = false;

      function getAppBasePath() {
        const { hostname, pathname } = window.location;
        if (hostname.endsWith('github.io')) {
          const parts = pathname.split('/').filter(Boolean);
          return parts.length ? `/${parts[0]}` : '';
        }
        return '';
      }

      const appBasePath = getAppBasePath();

      function buildUrl(path) {
        if (!path.startsWith('/')) {
          path = `/${path}`;
        }
        return `${appBasePath}${path}`;
      }

      function setStatus(message, type = '') {
        status.textContent = message;
        status.className = `status ${type}`.trim();
      }

      function formatPrice(value) {
        return Number(value || 0).toFixed(2).replace('.', ',') + ' ₺';
      }

      function resetForm() {
        form.reset();
        editingProductId = null;
        productIdInput.value = '';
        categoryModeInput.value = 'existing';
        categorySelect.value = '__new__';
        newCategoryFields.hidden = false;
        submitButton.textContent = 'Ürünü Ekle';
        cancelEditButton.hidden = true;
      }

      function syncAdminMode() {
        const controls = form.querySelectorAll('input, select, button');
        controls.forEach((control) => {
          if (control === cancelEditButton) {
            control.disabled = !apiWritable;
            return;
          }
          control.disabled = !apiWritable;
        });

        productList.querySelectorAll('button').forEach((button) => {
          button.disabled = !apiWritable;
        });

        categoryList.querySelectorAll('button').forEach((button) => {
          button.disabled = !apiWritable;
        });

        if (!apiWritable) {
          submitButton.textContent = 'Yonetim yalnizca local backend ile aktif';
          cancelEditButton.hidden = true;
        } else if (!editingProductId) {
          submitButton.textContent = 'Ürünü Ekle';
        }
      }

      async function fetchMenuData() {
        try {
          const response = await fetch(buildUrl('/api/products'), { cache: 'no-store' });
          if (response.ok) {
            apiWritable = true;
            return await response.json();
          }
        } catch (error) {
          console.warn('API unavailable, falling back to static JSON.', error);
        }

        const response = await fetch(buildUrl('/data/products.json'), { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Menü verisi yüklenemedi.');
        }

        apiWritable = false;
        return await response.json();
      }

      function populateCategoryOptions(data) {
        const categories = data.categories || [];
        const currentValue = categorySelect.value;
        categorySelect.innerHTML = '';

        const newOption = document.createElement('option');
        newOption.value = '__new__';
        newOption.textContent = 'Yeni kategori ekle';
        categorySelect.appendChild(newOption);

        categories.forEach((category) => {
          const option = document.createElement('option');
          option.value = category.name;
          option.textContent = category.name;
          categorySelect.appendChild(option);
        });

        if (currentValue && currentValue !== '__new__' && Array.from(categorySelect.options).some((option) => option.value === currentValue)) {
          categorySelect.value = currentValue;
        } else {
          categorySelect.value = '__new__';
        }

        toggleNewCategoryFields();
      }

      function toggleNewCategoryFields() {
        const isNewCategory = categorySelect.value === '__new__';
        newCategoryFields.hidden = !isNewCategory;
        categoryModeInput.value = isNewCategory ? 'new' : 'existing';
      }

      async function loadProducts() {
        try {
          const data = await fetchMenuData();
          renderProducts(data);
          renderCategories(data);
          populateCategoryOptions(data);
          syncAdminMode();
          setStatus(apiWritable ? 'Ürün listesi güncellendi.' : 'Ürünler yüklendi. Bu sayfa şu an sadece görüntüleme modunda.', 'ok');
        } catch (error) {
          console.error(error);
          setStatus('Ürün listesi yüklenemedi.', 'error');
        }
      }

      function renderCategories(data) {
        const categories = data.categories || [];
        if (!categories.length) {
          categoryList.innerHTML = '<div class="muted">Henüz kategori yok.</div>';
          return;
        }

        const items = categories.map((category) => `
          <div class="product-item">
            <div>
              <strong>${category.name}</strong>
              <div class="muted">${(category.products || []).length} ürün</div>
            </div>
            <div class="actions">
              <button type="button" class="danger" data-action="delete-category" data-category-name="${category.name}">Sil</button>
            </div>
          </div>
        `);

        categoryList.innerHTML = items.join('');
      }

      function renderProducts(data) {
        const categories = data.categories || [];
        if (!categories.length) {
          productList.innerHTML = '<div class="muted">Henüz ürün yok.</div>';
          return;
        }

        const items = [];
        categories.forEach((category) => {
          (category.products || []).forEach((product) => {
            items.push(`
              <div class="product-item">
                <div>
                  <strong>${product.name}</strong>
                  <div class="muted">${category.name} • ${formatPrice(product.price)}</div>
                </div>
                <div class="actions">
                  <button type="button" data-action="edit" data-product-id="${product.id}">Düzenle</button>
                  <button type="button" class="danger" data-action="delete" data-product-id="${product.id}">Sil</button>
                </div>
              </div>
            `);
          });
        });

        productList.innerHTML = items.join('') || '<div class="muted">Henüz ürün yok.</div>';
      }

      productList.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const action = button.dataset.action;
        const productId = button.dataset.productId;

        if (action === 'edit') {
          if (!apiWritable) {
            setStatus('Düzenleme için local backend üzerinden /admin açılmalı.', 'error');
            return;
          }

          const data = await fetchMenuData();
          let selected = null;

          for (const category of data.categories || []) {
            const match = (category.products || []).find((item) => item.id === productId);
            if (match) {
              selected = { ...match, category: category.name };
              break;
            }
          }

          if (!selected) return;

          document.getElementById('name').value = selected.name;
          categorySelect.value = selected.category;
          toggleNewCategoryFields();
          document.getElementById('price').value = selected.price;
          productIdInput.value = productId;
          editingProductId = productId;
          submitButton.textContent = 'Güncelle';
          cancelEditButton.hidden = false;
          setStatus(`${selected.name} düzenleme modunda.`, '');
          document.getElementById('name').focus();
          return;
        }

        if (action === 'delete') {
          if (!apiWritable) {
            setStatus('Silme işlemi sadece local backend üzerinden kullanılabilir.', 'error');
            return;
          }

          const confirmed = window.confirm('Bu ürünü silmek istediğinize emin misiniz?');
          if (!confirmed) return;

          try {
            const response = await fetch(buildUrl('/api/products/delete'), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: productId })
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || 'Ürün silinemedi.');
            await loadProducts();
            if (editingProductId === productId) resetForm();
            setStatus('Ürün silindi.', 'ok');
          } catch (error) {
            console.error(error);
            setStatus(error.message || 'Ürün silinemedi.', 'error');
          }
        }
      });

      categoryList.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action="delete-category"]');
        if (!button) return;

        const categoryName = button.dataset.categoryName;
        if (!apiWritable) {
          setStatus('Kategori silme işlemi sadece local backend üzerinden kullanılabilir.', 'error');
          return;
        }

        const confirmed = window.confirm(`${categoryName} kategorisini silmek istediğinize emin misiniz?`);
        if (!confirmed) return;

        try {
          const response = await fetch(buildUrl('/api/categories/delete'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: categoryName })
          });
          const data = await response.json();
          if (!response.ok || !data.ok) throw new Error(data.error || 'Kategori silinemedi.');
          await loadProducts();
          setStatus('Kategori silindi.', 'ok');
        } catch (error) {
          console.error(error);
          setStatus(error.message || 'Kategori silinemedi.', 'error');
        }
      });

      categorySelect.addEventListener('change', toggleNewCategoryFields);

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!apiWritable) {
          setStatus('Kaydetme işlemi için local backend üzerinden /admin açılmalı.', 'error');
          return;
        }

        setStatus('Ürün kaydediliyor…', '');

        const formData = new FormData(form);
        const endpoint = editingProductId ? buildUrl('/api/products/update') : buildUrl('/api/products/add');

        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            body: formData
          });
          const data = await response.json();

          if (!response.ok || !data.ok) {
            throw new Error(data.error || 'İşlem başarısız oldu.');
          }

          await loadProducts();
          resetForm();
          setStatus(editingProductId ? `Ürün güncellendi: ${data.product.name}` : `Ürün eklendi: ${data.product.name}`, 'ok');
        } catch (error) {
          console.error(error);
          setStatus(error.message || 'Beklenmeyen bir hata oluştu.', 'error');
        }
      });

      cancelEditButton.addEventListener('click', () => {
        resetForm();
        setStatus('Düzenleme iptal edildi.', '');
      });

      syncAdminMode();
      loadProducts();
    </script>
  </body>
</html>
