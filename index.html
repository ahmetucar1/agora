<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora Coffee - Menu</title>
    <style>
      :root {
        --bg: #efe6db;
        --paper: #fffaf3;
        --ink: #161412;
        --muted: #6d5c4f;
        --line: #d6c6b5;
        --accent: #b5492d;
        --accent-soft: #f8d9cb;
        --mint: #1f8b73;
        --mint-soft: #d5f2ea;
        --shadow: 0 20px 38px rgba(31, 20, 13, 0.17);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        padding: 14px;
        background:
          radial-gradient(circle at 8% 10%, rgba(181, 73, 45, 0.14), transparent 33%),
          radial-gradient(circle at 93% 87%, rgba(31, 139, 115, 0.17), transparent 31%),
          linear-gradient(115deg, #efe6db, #f3e7d8, #e5efe9, #f6e8db),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.5) 0 11px,
            rgba(239, 230, 219, 0.5) 11px 22px
          ),
          var(--bg);
        background-size: auto, auto, 220% 220%, auto, auto;
        animation: bg-shift 14s ease-in-out infinite alternate;
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 30px;
        overflow: hidden;
        background: linear-gradient(170deg, #fffdf9, var(--paper));
        box-shadow: var(--shadow);
      }

      .header {
        padding: 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(140deg, rgba(181, 73, 45, 0.1), rgba(255, 255, 255, 0.5), rgba(31, 139, 115, 0.12));
      }

      .head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .logo {
        width: 66px;
        height: 66px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid #cfdfda;
        box-shadow: 0 10px 16px rgba(31, 139, 115, 0.2);
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .kicker {
        margin: 0;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--mint);
        font-weight: 700;
      }

      h1 {
        margin: 2px 0 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: clamp(1.75rem, 3.2vw, 2.35rem);
        line-height: 1.14;
        letter-spacing: 0.01em;
        font-weight: 700;
      }

      .chip {
        border: 1px solid #d8c5b6;
        border-radius: 999px;
        background: #fff6ed;
        color: #87553f;
        padding: 7px 12px;
        font-size: 0.76rem;
        font-weight: 700;
      }

      .ticker {
        margin-top: 12px;
        border: 1px solid #ddcdbd;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }

      .ticker-track {
        display: flex;
        gap: 24px;
        white-space: nowrap;
        padding: 7px 10px;
        color: #7a5b4b;
        font-size: 0.8rem;
        animation: slide 20s linear infinite;
      }

      .ticker-track span {
        font-weight: 600;
      }

      .ticker-track strong {
        color: #2f8a74;
      }

      .ticker-track em {
        color: #8b4a31;
        font-style: normal;
        font-weight: 700;
      }

      .content {
        padding: 18px;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      .top-strip {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 14px;
      }

      .hero-card {
        border: 1px solid #d8c9bb;
        border-radius: 18px;
        overflow: hidden;
        background: #fff;
      }

      .hero-card img {
        width: 100%;
        height: 208px;
        object-fit: cover;
        display: block;
      }

      .hero-copy {
        padding: 12px;
        border-top: 1px solid #e7d9cc;
      }

      .hero-copy h2 {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
      }

      .hero-copy p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .lead-btn {
        border: 1px solid #d9c7b6;
        background: #fff;
        border-radius: 10px;
        padding: 9px 12px;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 700;
        color: #5f4637;
      }

      .mosaic {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        grid-auto-flow: dense;
        gap: 12px;
      }

      .cat-card {
        grid-column: span 3;
        border: 1px solid #d9cbbd;
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
        cursor: pointer;
        text-align: left;
        padding: 0;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        animation: pop 420ms ease both;
        animation-delay: calc(var(--i, 0) * 50ms);
      }

      .cat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 22px rgba(44, 30, 20, 0.15);
      }

      .cat-card.large {
        grid-column: span 6;
        grid-row: span 2;
      }

      .cat-card.wide {
        grid-column: span 6;
      }

      .cat-card.tall {
        grid-row: span 2;
      }

      .cat-card.accent {
        background: linear-gradient(145deg, #fff, #fff5eb);
      }

      .cat-card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
      }

      .cat-card.large img {
        height: 246px;
      }

      .cat-card.tall img {
        height: 230px;
      }

      .cat-info {
        padding: 10px 11px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .cat-info strong {
        font-size: 0.9rem;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-weight: 700;
      }

      .count {
        border: 1px solid #d9cbbb;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #85452e;
        padding: 4px 9px;
        font-size: 0.72rem;
        font-weight: 700;
      }

      .detail-wrap {
        border: 1px solid #d9cbbd;
        border-radius: 18px;
        overflow: hidden;
      }

      .detail-screen-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        border: 1px solid #dfd2c6;
        border-radius: 12px;
        background: #fff;
        padding: 8px 10px;
      }

      .detail-screen-head .title {
        margin: 0;
        font-size: 1rem;
        color: #5d4b3e;
        font-weight: 700;
      }

      .detail-panel {
        padding: 14px;
        background: linear-gradient(180deg, #fffdf9, #fff);
      }

      .detail-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }

      .detail-top h2 {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: 1.45rem;
        font-weight: 700;
      }

      .back-btn {
        border: 1px solid #d7c8b9;
        background: #fff;
        color: #6c4b3a;
        border-radius: 999px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .product-list {
        display: grid;
        gap: 9px;
      }

      .product-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid #e3d6ca;
        border-radius: 12px;
        padding: 9px;
        background: #fff;
      }

      .product-left {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      .product-thumb {
        width: 44px;
        height: 44px;
        border-radius: 11px;
        object-fit: cover;
        border: 1px solid #ddd2c8;
        flex-shrink: 0;
      }

      .product-name {
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .price {
        border-radius: 999px;
        background: linear-gradient(120deg, var(--accent), #8c3421);
        color: #fff;
        padding: 7px 10px;
        font-size: 0.78rem;
        min-width: 78px;
        text-align: center;
        font-weight: 700;
      }

      .empty {
        border: 1px dashed #dacaba;
        border-radius: 14px;
        padding: 22px;
        text-align: center;
        color: #7b5b47;
        background: #fff8ef;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding: 12px 18px;
        color: var(--muted);
        font-size: 0.78rem;
        display: none;
      }

      @keyframes pop {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes slide {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      @keyframes bg-shift {
        0% {
          background-position: center, center, 0% 50%, center, center;
        }
        100% {
          background-position: center, center, 100% 50%, center, center;
        }
      }

      @media (max-width: 980px) {
        .cat-card,
        .cat-card.tall {
          grid-column: span 4;
          grid-row: span 1;
        }

        .cat-card.large,
        .cat-card.wide {
          grid-column: span 8;
          grid-row: span 1;
        }

        .detail-wrap {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 700px) {
        body {
          padding: 9px;
        }

        .shell {
          border-radius: 20px;
        }

        .header {
          padding: 13px;
        }

        .content {
          padding: 13px;
        }

        .head-row {
          align-items: flex-start;
        }

        .chip {
          font-size: 0.7rem;
          padding: 6px 9px;
        }

        .hero-card img {
          height: 182px;
        }

        .mosaic {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .cat-card,
        .cat-card.large,
        .cat-card.wide,
        .cat-card.tall,
        .cat-card.accent {
          grid-column: span 1;
          grid-row: span 1;
        }

        .cat-card img,
        .cat-card.large img,
        .cat-card.tall img {
          height: 150px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="head-row">
          <div class="brand">
            <div class="logo">
              <img src="images/logo.PNG?w=156" alt="Agora Coffee" loading="eager" decoding="async" fetchpriority="high" />
            </div>
            <div>
              <p class="kicker">Poster Menu</p>
              <h1>Agora Coffee</h1>
            </div>
          </div>
          <div class="chip">Art Direction Shift</div>
        </div>
        <div class="ticker">
          <div class="ticker-track" id="tickerTrack">
            <span><strong>AGORA</strong> urunler yukleniyor...</span>
            <span><strong>AGORA</strong> urunler yukleniyor...</span>
          </div>
        </div>
      </header>

      <main class="content">
        <section id="homeScreen" class="screen active"></section>
        <section id="detailScreen" class="screen"></section>
      </main>

      <footer class="footer"></footer>
    </div>

    <script>
      let categories = [];

      const homeScreen = document.getElementById("homeScreen");
      const detailScreen = document.getElementById("detailScreen");
      const tickerTrack = document.getElementById("tickerTrack");

      async function fetchMenuData() {
        const endpoints = ["api/products", "data/products.json"];

        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint, { cache: "no-store" });
            if (!response.ok) {
              continue;
            }
            return await response.json();
          } catch (error) {
            console.warn(`Menu request failed for ${endpoint}`, error);
          }
        }

        throw new Error("Menu data could not be loaded.");
      }

      async function loadMenu() {
        renderTicker();
        try {
          const data = await fetchMenuData();
          categories = Array.isArray(data.categories) ? data.categories : [];
        } catch (error) {
          console.error(error);
          categories = [];
        }
        renderTicker();
        renderHome();
      }

      function shuffled(items) {
        const copy = [...items];
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function sampleProducts(limit = 10) {
        const pool = [];
        categories.forEach((category) => {
          (category.products || []).forEach((product) => {
            pool.push({
              categoryName: category.name,
              name: product.name,
              price: Number(product.price || 0),
            });
          });
        });
        return shuffled(pool).slice(0, limit);
      }

      function formatPrice(value) {
        return `₺${Number(value || 0).toFixed(2).replace(".00", ",00")}`;
      }

      function renderTicker() {
        if (!tickerTrack) return;
        const picks = sampleProducts(8);
        if (!picks.length) {
          tickerTrack.innerHTML = '<span><strong>AGORA</strong> menu yukleniyor...</span>';
          return;
        }

        const itemMarkup = picks
          .map((item) => `<span><strong>${item.name}</strong> <em>${formatPrice(item.price)}</em> ${item.categoryName}</span>`)
          .join("");
        tickerTrack.innerHTML = itemMarkup + itemMarkup;
      }

      function cardClass(index) {
        if (index === 0) return "large";
        if (index % 6 === 1) return "tall";
        if (index % 5 === 2) return "wide";
        if (index % 4 === 0) return "accent";
        return "";
      }

      function renderHome() {
        homeScreen.classList.add("active");
        detailScreen.classList.remove("active");

        if (!categories.length) {
          homeScreen.innerHTML = '<div class="empty">Menu su an yuklenemedi. Lutfen biraz sonra tekrar deneyin.</div>';
          return;
        }

        const lead = categories.find((category) => /iced\s*coffee|iced/i.test(category.name || "") || category.id === "iced") || categories[0];

        homeScreen.innerHTML = `
          <section class="top-strip">
            <article class="hero-card">
              <img src="images/${lead.image}?w=760" alt="${lead.name}" loading="eager" decoding="async" fetchpriority="high" />
              <div class="hero-copy">
                <h2>${lead.name}</h2>
                <p>${(lead.products || []).length} urunle one cikiyor. Asagidaki kolajdan farkli bir kategori sec.</p>
                <button class="lead-btn" data-id="${lead.id}">One Cikan Kategoriye Git</button>
              </div>
            </article>
          </section>

          <section class="mosaic">
            ${categories
              .map(
                (category, index) => `
                  <button class="cat-card ${cardClass(index)}" style="--i:${index}" data-id="${category.id}">
                    <img
                      src="images/${category.image}?w=420"
                      alt="${category.name}"
                      loading="${index < 2 ? "eager" : "lazy"}"
                      decoding="async"
                      fetchpriority="${index === 0 ? "high" : "auto"}"
                    />
                    <div class="cat-info">
                      <strong>${category.name}</strong>
                      <span class="count">${(category.products || []).length}</span>
                    </div>
                  </button>
                `
              )
              .join("")}
          </section>
        `;
      }

      function renderDetail(categoryId) {
        const category = categories.find((item) => item.id === categoryId);
        if (!category) return;

        homeScreen.classList.remove("active");
        detailScreen.classList.add("active");

        detailScreen.innerHTML = `
          <div class="detail-screen-head">
            <button class="back-btn" id="backBtn">Geri Don</button>
            <p class="title">Menuye Donus</p>
          </div>
          <section class="detail-wrap">
            <div class="detail-panel">
              <div class="detail-top">
                <h2>${category.name}</h2>
              </div>
              <div class="product-list">
                ${(category.products || [])
                  .map(
                    (product) => `
                      <div class="product-row">
                        <div class="product-left">
                          <img
                            class="product-thumb"
                            src="images/${product.image || category.image}?w=120"
                            alt="${product.name}"
                            loading="lazy"
                            decoding="async"
                          />
                          <div class="product-name">${product.name}</div>
                        </div>
                        <div class="price">₺${Number(product.price || 0).toFixed(2).replace(".00", ",00")}</div>
                      </div>
                    `
                  )
                  .join("")}
              </div>
            </div>
          </section>
        `;
      }

      homeScreen.addEventListener("click", (event) => {
        const target = event.target.closest("[data-id]");
        if (!target) return;
        renderDetail(target.dataset.id);
      });

      detailScreen.addEventListener("click", (event) => {
        if (event.target.id === "backBtn") {
          renderHome();
        }
      });

      loadMenu();
    </script>
  </body>
</html>
